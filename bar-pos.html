<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar POS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root {
  --bg:#0a0908;--bg2:#121110;--bg3:#1a1816;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6130;
  --cream:#f0e8d8;--cream-dim:#b8a888;--border:rgba(201,168,76,0.2);--border-strong:rgba(201,168,76,0.5);
  --red:#c0392b;--green-light:#4caf72;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;}
.header{background:var(--bg2);border-bottom:1px solid var(--border-strong);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;font-style:italic;color:var(--gold-light);}
.header-date{font-size:10px;color:var(--gold-dim);letter-spacing:0.15em;margin-top:2px;}
.tab-btns{display:flex;gap:4px;}
.tab-btn{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.15em;padding:7px 14px;border:1px solid var(--border);background:transparent;color:var(--cream-dim);cursor:pointer;transition:all 0.2s;}
.tab-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,0.08);}
.page{display:none;}.page.active{display:block;}

/* SLIPS BAR */
.slips-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;height:44px;}
.slips-bar::-webkit-scrollbar{display:none;}
.slip-tab{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;border-right:1px solid var(--border);cursor:pointer;transition:all 0.2s;font-size:13px;color:var(--cream-dim);white-space:nowrap;position:relative;}
.slip-tab.active{background:rgba(201,168,76,0.08);color:var(--gold-light);}
.slip-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);}
.slip-tab-amount{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--gold-dim);}
.slip-tab.active .slip-tab-amount{color:var(--gold);}
.slip-tab-close{font-size:14px;color:var(--gold-dim);background:none;border:none;cursor:pointer;padding:0;line-height:1;margin-left:2px;}
.slip-tab-close:hover{color:var(--red);}
.btn-add-slip{flex-shrink:0;padding:0 16px;height:100%;background:transparent;border:none;border-right:1px solid var(--border);color:var(--gold-dim);cursor:pointer;font-size:20px;transition:all 0.2s;}
.btn-add-slip:hover{color:var(--gold-light);background:rgba(201,168,76,0.06);}

/* ORDER LAYOUT */
.order-layout{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 101px);}
.menu-panel{overflow-y:auto;border-right:1px solid var(--border);}
.menu-cat-strip{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:0;z-index:10;}
.menu-cat-strip::-webkit-scrollbar{display:none;}
.menu-cat-tab{flex-shrink:0;padding:10px 14px;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.1em;color:var(--cream-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.menu-cat-tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}
.menu-section{display:none;padding:10px;}.menu-section.active{display:block;}
.menu-section-title{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold-dim);text-transform:uppercase;padding:6px 4px 5px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;}
.menu-btn{background:var(--bg3);border:1px solid var(--border);padding:11px 10px;cursor:pointer;transition:all 0.15s;text-align:left;}
.menu-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,0.06);}
.menu-btn:active{transform:scale(0.97);}
.menu-btn-name{font-size:12px;color:var(--cream);line-height:1.3;margin-bottom:3px;}
.menu-btn-price{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);}

/* SLIP PANEL */
.slip-panel{display:flex;flex-direction:column;background:var(--bg2);}
.slip-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.slip-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px;}
.customer-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif JP',serif;font-size:14px;padding:8px 10px;outline:none;transition:border-color 0.2s;}
.customer-input:focus{border-color:var(--gold);}
.order-list{flex:1;overflow-y:auto;padding:6px;}
.order-item{display:flex;align-items:center;gap:6px;padding:7px 5px;border-bottom:1px solid rgba(201,168,76,0.08);}
.order-item-name{flex:1;font-size:12px;color:var(--cream);line-height:1.3;}
.order-item-qty{display:flex;align-items:center;gap:5px;}
.qty-btn{width:22px;height:22px;border:1px solid var(--border);background:transparent;color:var(--gold);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.qty-btn:hover{background:rgba(201,168,76,0.1);}
.qty-num{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--cream);min-width:18px;text-align:center;}
.order-item-price{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold-light);min-width:55px;text-align:right;}
.order-item-del{color:var(--red);background:none;border:none;cursor:pointer;font-size:15px;opacity:0.5;}
.order-item-del:hover{opacity:1;}
.order-empty{text-align:center;padding:36px 16px;color:var(--gold-dim);font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.15em;}
.slip-footer{border-top:1px solid var(--border-strong);padding:12px 14px;}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.total-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;}
.total-amount{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold-light);}
.checkout-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.btn-checkout{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.12em;padding:11px;border:1px solid;cursor:pointer;transition:all 0.2s;}
.btn-cash{border-color:var(--gold-dim);color:var(--cream);background:transparent;}
.btn-cash:hover{background:rgba(201,168,76,0.1);border-color:var(--gold);}
.btn-card{border-color:var(--gold);color:var(--bg);background:var(--gold);}
.btn-card:hover{background:var(--gold-light);}

/* SALES */
.sales-page{max-width:900px;margin:0 auto;padding:24px 20px;}
.sales-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--gold-light);margin-bottom:4px;}
.sales-sub{font-size:11px;letter-spacing:0.2em;color:var(--gold-dim);margin-bottom:22px;}
.sales-filter{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
.filter-input{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif JP',serif;font-size:12px;padding:7px 10px;outline:none;}
.filter-input:focus{border-color:var(--gold);}
.filter-btn{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.15em;padding:7px 14px;border:1px solid var(--border-strong);background:transparent;color:var(--cream-dim);cursor:pointer;transition:all 0.2s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold-light);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);padding:16px 14px;}
.stat-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold-light);}
.stat-sub{font-size:11px;color:var(--cream-dim);margin-top:3px;}
.sales-section{margin-bottom:26px;}
.sales-section-title{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.sales-table{width:100%;border-collapse:collapse;}
.sales-table th{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);}
.sales-table td{font-size:12px;padding:9px 8px;border-bottom:1px solid rgba(201,168,76,0.06);color:var(--cream);}
.sales-table tr:hover td{background:rgba(201,168,76,0.03);}
.num{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold-light);text-align:right;}
.rank{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold-dim);text-align:center;width:36px;}
.badge-cash{font-size:10px;padding:2px 6px;border:1px solid var(--gold-dim);color:var(--gold-dim);}
.badge-card{font-size:10px;padding:2px 6px;border:1px solid var(--green-light);color:var(--green-light);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(5,4,3,0.9);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border-strong);padding:26px 22px;width:100%;max-width:360px;text-align:center;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--gold-light);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--cream-dim);margin-bottom:16px;}
.modal-total{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold-light);margin-bottom:18px;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.modal-btn{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.12em;padding:12px;border:1px solid;cursor:pointer;transition:all 0.2s;}
.modal-cancel{border-color:var(--border);color:var(--cream-dim);background:transparent;grid-column:1/-1;}
.modal-cancel:hover{border-color:var(--gold-dim);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(26,74,42,0.96);border:1px solid var(--green-light);color:var(--green-light);font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.15em;padding:10px 22px;z-index:999;opacity:0;transition:opacity 0.4s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--gold-dim);}
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--bg2);border:1px solid var(--border-strong);padding:40px 32px;width:100%;max-width:360px;text-align:center;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--gold-light);margin-bottom:4px;}
.login-sub{font-size:11px;letter-spacing:0.2em;color:var(--gold-dim);margin-bottom:28px;}
.login-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif JP',serif;font-size:14px;padding:10px 12px;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:0.2em;padding:13px;border:1px solid var(--gold);background:var(--gold);color:var(--bg);cursor:pointer;transition:all 0.2s;margin-top:4px;}
.login-btn:hover{background:var(--gold-light);}
.login-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-email{font-size:10px;color:var(--gold-dim);letter-spacing:0.1em;}
.logout-btn{font-family:'Cormorant Garamond',serif;font-size:11px;padding:5px 10px;border:1px solid var(--border);background:transparent;color:var(--gold-dim);cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">Bar POS</div>
    <div class="login-sub">— スタッフログイン —</div>
    <input class="login-input" type="email" id="loginEmail" placeholder="メールアドレス" autocomplete="email">
    <input class="login-input" type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="header">
  <div><div class="header-title">Bar POS</div><div class="header-date" id="headerDate"></div></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="user-info">
      <span class="user-email" id="userEmail"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchPage('order',this)">注文</button>
      <button class="tab-btn" onclick="switchPage('sales',this)">売上</button>
      <button class="tab-btn" onclick="switchPage('expense',this)">経費</button>
    </div>
  </div>
</div>

<div class="page active" id="page-order">
  <div class="slips-bar" id="slipsBar"></div>
  <div class="order-layout">
    <div class="menu-panel">
      <div class="menu-cat-strip" id="menuCatStrip"></div>
      <div id="menuSections"></div>
    </div>
    <div class="slip-panel">
      <div class="slip-header">
        <div class="slip-label" id="slipLabel">— 伝票 —</div>
        <div style="display:flex;gap:6px;align-items:center;">
        <input class="customer-input" id="customerName" placeholder="お客様のお名前" type="text" oninput="updateSlipName()" style="flex:1;">
        <input class="customer-input" id="guestCount" placeholder="人数" type="number" min="1" style="width:65px;text-align:center;" oninput="updateGuestCount()">
        <span style="font-size:11px;color:var(--gold-dim);white-space:nowrap;">名</span>
      </div>
      </div>
      <div class="order-list" id="orderList"></div>
      <div class="slip-footer">
        <div class="total-row">
          <span class="total-label">合計</span>
          <span class="total-amount" id="totalAmount">¥0</span>
        </div>
        <div class="checkout-btns">
          <button class="btn-checkout btn-cash" onclick="checkout('cash')">現金精算</button>
          <button class="btn-checkout btn-card" onclick="checkout('card')">カード精算</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-sales">
  <div class="sales-page">
    <div class="sales-title">Sales Report</div>
    <div class="sales-sub">売上レポート</div>
    <div class="sales-filter">
      <button class="filter-btn active" onclick="setSalesFilter('day',this)">今日</button>
      <button class="filter-btn" onclick="setSalesFilter('month',this)">今月</button>
      <button class="filter-btn" onclick="setSalesFilter('all',this)">全期間</button>
      <input class="filter-input" type="month" id="monthPicker" onchange="setSalesFilter('month-pick',this)" style="max-width:155px">
      <button class="filter-btn" onclick="downloadCSV()" style="margin-left:auto;border-color:var(--gold);color:var(--gold);">⬇ CSV</button>
      <button class="filter-btn" onclick="downloadFullBackup()" style="border-color:var(--green-light);color:var(--green-light);">⬇ 全データバックアップ</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">売上合計</div><div class="stat-value" id="statTotal">¥0</div><div class="stat-sub" id="statCount">0件</div></div>
      <div class="stat-card"><div class="stat-label">現金</div><div class="stat-value" id="statCash">¥0</div><div class="stat-sub" id="statCashCount">0件</div></div>
      <div class="stat-card"><div class="stat-label">カード</div><div class="stat-value" id="statCard">¥0</div><div class="stat-sub" id="statCardCount">0件</div></div>
    </div>
    <div class="sales-section">
      <div class="sales-section-title">注文履歴</div>
      <table class="sales-table"><thead><tr id="salesHistoryHead"><th>日時</th><th>お客様</th><th>支払</th><th class="num">金額</th></tr></thead><tbody id="salesHistory"></tbody></table>
    </div>
    <div class="sales-section">
      <div class="sales-section-title">メニュー別 注文数ランキング</div>
      <table class="sales-table"><thead><tr><th class="rank">#</th><th>メニュー</th><th class="num">注文数</th><th class="num">売上</th></tr></thead><tbody id="menuRanking"></tbody></table>
    </div>
  </div>
</div>

<!-- EXPENSE PAGE -->
<div class="page" id="page-expense">
  <div class="sales-page">
    <div class="sales-title">Expense</div>
    <div class="sales-sub">経費管理</div>

    <!-- 月フィルター -->
    <div class="sales-filter">
      <input class="filter-input" type="month" id="expenseMonthPicker" onchange="renderExpense()" style="max-width:155px">
      <button class="filter-btn" onclick="downloadExpenseCSV()" style="border-color:var(--gold);color:var(--gold);">⬇ CSV</button>
    </div>

    <!-- サマリー -->
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card"><div class="stat-label">売上合計</div><div class="stat-value" id="expStatSales">¥0</div></div>
      <div class="stat-card"><div class="stat-label">経費合計</div><div class="stat-value" id="expStatCost">¥0</div></div>
      <div class="stat-card"><div class="stat-label">利益</div><div class="stat-value" id="expStatProfit">¥0</div><div class="stat-sub" id="expStatMargin"></div></div>
    </div>

    <!-- 固定経費 -->
    <div class="sales-section">
      <div class="sales-section-title">固定経費（毎月自動計上）</div>
      <table class="sales-table">
        <thead><tr><th>品目</th><th class="num">月額</th><th></th></tr></thead>
        <tbody id="fixedExpenseList"></tbody>
      </table>
      <div style="display:grid;grid-template-columns:1fr 120px auto;gap:8px;margin-top:10px;align-items:center;">
        <input class="filter-input" type="text" id="fixedItem" placeholder="品目名" style="width:100%">
        <input class="filter-input" type="number" id="fixedAmount" placeholder="金額" style="width:100%">
        <button class="filter-btn" onclick="addFixedExpense()" style="border-color:var(--gold);color:var(--gold);white-space:nowrap;">追加</button>
      </div>
    </div>

    <!-- 入力フォーム -->
    <div class="sales-section">
      <div class="sales-section-title">経費を追加</div>
      <div style="display:grid;grid-template-columns:140px 1fr 1fr 100px auto;gap:8px;align-items:center;">
        <input class="filter-input" type="date" id="expDate" style="width:100%">
        <input class="filter-input" type="text" id="expStore" placeholder="店舗名" style="width:100%">
        <input class="filter-input" type="text" id="expItem" placeholder="品目" style="width:100%">
        <input class="filter-input" type="number" id="expAmount" placeholder="金額" style="width:100%">
        <button class="filter-btn" onclick="addExpense()" style="border-color:var(--gold);color:var(--gold);white-space:nowrap;">追加</button>
      </div>
    </div>

    <!-- 経費リスト -->
    <div class="sales-section">
      <div class="sales-section-title">経費一覧</div>
      <table class="sales-table">
        <thead><tr><th>日付</th><th>店舗名</th><th>品目</th><th class="num">金額</th><th></th></tr></thead>
        <tbody id="expenseList"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="dayModal">
  <div class="modal" style="max-width:460px;">
    <div class="modal-title" id="dayModalTitle"></div>
    <div class="modal-sub" id="dayModalSub"></div>
    <div style="margin:14px 0;max-height:60vh;overflow-y:auto;" id="dayModalList"></div>
    <button class="modal-btn modal-cancel" onclick="closeDayModal()">閉じる</button>
  </div>
</div>

<div class="modal-overlay" id="receiptModal">
  <div class="modal">
    <div class="modal-title" id="receiptName"></div>
    <div class="modal-sub" id="receiptTime"></div>
    <div style="margin:16px 0;text-align:left;border-top:1px solid var(--border);padding-top:12px;" id="receiptItems"></div>

let slips=[],activeSlipId=null,slipCounter=0,pendingPayment=null,salesFilter='day',filterMonth='';
// Sales storage moved to Firebase

function addSlip(){
  slipCounter++;
  const id=Date.now()+slipCounter;
  slips.push({id,name:'',guestCount:0,items:[]});
  activeSlipId=id;
  renderSlipsBar();
  renderSlip();
  setTimeout(()=>document.getElementById('customerName').focus(),50);
}

function switchSlip(id){
  activeSlipId=id;
  renderSlipsBar();
  renderSlip();
}

function closeSlip(id,e){
  e.stopPropagation();
  const slip=slips.find(s=>s.id===id);
  if(slip&&slip.items.length>0&&!confirm((slip.name||'この伝票')+'を閉じますか?'))return;
  slips=slips.filter(s=>s.id!==id);
  if(activeSlipId===id)activeSlipId=slips.length>0?slips[slips.length-1].id:null;
  if(slips.length===0)addSlip();
  else{renderSlipsBar();renderSlip();}
}

function getActiveSlip(){return slips.find(s=>s.id===activeSlipId)||null;}

function renderSlipsBar(){
  const bar=document.getElementById('slipsBar');
  bar.innerHTML='';
  const addBtn=document.createElement('button');
  addBtn.className='btn-add-slip';addBtn.title='新しい伝票';addBtn.textContent='＋';
  addBtn.onclick=addSlip;bar.appendChild(addBtn);
  slips.forEach((slip,i)=>{
    const total=slip.items.reduce((s,o)=>s+o.price*o.qty,0);
    const tab=document.createElement('div');
    tab.className='slip-tab'+(slip.id===activeSlipId?' active':'');
    tab.onclick=()=>switchSlip(slip.id);
    var nameStr=slip.name||('伝票'+(i+1));
    var amountStr=total>0?'<span class="slip-tab-amount">¥'+total.toLocaleString()+'</span>':'';
    tab.innerHTML='<span>'+nameStr+'</span>'+amountStr+'<button class="slip-tab-close" onclick="closeSlip('+slip.id+',event)">\u00d7</button>';
    bar.appendChild(tab);
  });
}

function updateSlipName(){
  const slip=getActiveSlip();
  if(!slip)return;
  slip.name=document.getElementById('customerName').value;
  renderSlipsBar();
}

function updateGuestCount(){
  var slip=getActiveSlip();
  if(!slip)return;
  var count=parseInt(document.getElementById('guestCount').value)||0;
  slip.guestCount=count;
  // チャージを更新
  slip.items=slip.items.filter(function(i){return i.name!=='チャージ';});

    slip.items.unshift({name:'チャージ',price:300,qty:count});

function addToOrder(item){
  const slip=getActiveSlip();if(!slip)return;

  if(ex)ex.qty++;else slip.items.push({...item,qty:1});

}

function changeQty(idx,delta){
  const slip=getActiveSlip();if(!slip)return;
  slip.items[idx].qty+=delta;
  if(slip.items[idx].qty<=0)slip.items.splice(idx,1);
  renderSlip();renderSlipsBar();
}

function removeItem(idx){
  const slip=getActiveSlip();if(!slip)return;
  slip.items.splice(idx,1);renderSlip();renderSlipsBar();
}

function renderSlip(){
  const slip=getActiveSlip();
  document.getElementById('customerName').value=slip?slip.name:'';
  document.getElementById('guestCount').value=slip&&slip.guestCount>0?slip.guestCount:'';
  document.getElementById('slipLabel').textContent=slip?`— 伝票 ${slips.indexOf(slip)+1} —`:'— 伝票 —';

    list.innerHTML='<div class="order-empty">メニューから選択してください</div>';

  list.innerHTML='';let total=0;

    row.className='order-item';

function checkout(method){
  const slip=getActiveSlip();

  if(!slip.guestCount||slip.guestCount<=0){showToast('人数を入力してください');document.getElementById('guestCount').focus();return;}

  pendingPayment={method,total,slipId:slip.id,name:slip.name||'お客様',guestCount:slip.guestCount||0};
  document.getElementById('modalTitle').textContent=method==='cash'?'現金精算':'カード精算';
  document.getElementById('modalSub').textContent=pendingPayment.name+' 様';
  document.getElementById('modalTotal').textContent='¥'+total.toLocaleString();
  document.getElementById('modalConfirmBtn').className='modal-btn '+(method==='cash'?'btn-cash':'btn-card');
  document.getElementById('modalConfirmBtn').textContent=method==='cash'?'現金受取確認':'カード決済確認';
  document.getElementById('checkoutModal').classList.add('open');
}

function confirmCheckout(){
  if(!pendingPayment)return;
  var slip=slips.find(function(s){return s.id===pendingPayment.slipId;});
  var sale={id:Date.now(),date:new Date().toISOString(),customer:pendingPayment.name,guestCount:pendingPayment.guestCount||0,method:pendingPayment.method,total:pendingPayment.total,items:(slip?slip.items:[]).map(function(o){return {name:o.name,price:o.price,qty:o.qty};})};
  saveSale(sale);
  closeModal();
  showToast('¥'+pendingPayment.total.toLocaleString()+' 精算完了 ✓');
  slips=slips.filter(function(s){return s.id!==pendingPayment.slipId;});
  if(slips.length===0)addSlip();
  else{activeSlipId=slips[slips.length-1].id;renderSlipsBar();renderSlip();}
  pendingPayment=null;
}

function closeModal(){document.getElementById('checkoutModal').classList.remove('open');}

function setSalesFilter(type,el){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(el&&el.classList)el.classList.add('active');
  salesFilter=type;if(type==='month-pick')filterMonth=el.value;renderSales();
}

function getBusinessDay(dateStr){
  // 0〜3時59分は前日の営業日扱い（19時〜翌3時59分が同じ営業日）
  var dt=new Date(dateStr);
  if(dt.getHours()<4) dt.setDate(dt.getDate()-1);
  return dt.getFullYear()+'/'+('0'+(dt.getMonth()+1)).slice(-2)+'/'+('0'+dt.getDate()).slice(-2);
}
function getBusinessDayDisplay(dateStr){
  var dt=new Date(dateStr);
  if(dt.getHours()<4) dt.setDate(dt.getDate()-1);
  return (dt.getMonth()+1)+'/'+dt.getDate();
}
function getTodayBizDay(){
  var now=new Date();
  if(now.getHours()<4) now.setDate(now.getDate()-1);
  return now.getFullYear()+'/'+('0'+(now.getMonth()+1)).slice(-2)+'/'+('0'+now.getDate()).slice(-2);
}
function getTodayBizMonth(){
  var now=new Date();
  if(now.getHours()<4) now.setDate(now.getDate()-1);
  return now.getFullYear()+'/'+('0'+(now.getMonth()+1)).slice(-2);
}
function getFilteredSales(callback){
  getSales(function(all){
    var result;
    if(salesFilter==='day'){
      var today=getTodayBizDay();
      result=all.filter(function(s){return getBusinessDay(s.date)===today;});
    } else if(salesFilter==='month'){
      var month=getTodayBizMonth();
      result=all.filter(function(s){return getBusinessDay(s.date).startsWith(month);});
    } else if(salesFilter==='month-pick'&&filterMonth){
      var m=filterMonth.replace('-','/');
      result=all.filter(function(s){return getBusinessDay(s.date).startsWith(m);});
    } else {
      result=all;
    }
    callback(result);
  });
}

function renderSales(){
  getFilteredSales(function(data){
  const total=data.reduce((s,d)=>s+d.total,0);
  const cash=data.filter(d=>d.method==='cash'),card=data.filter(d=>d.method==='card');
  document.getElementById('statTotal').textContent='¥'+total.toLocaleString();
  document.getElementById('statCount').textContent=data.length+'件';
  document.getElementById('statCash').textContent='¥'+cash.reduce((s,d)=>s+d.total,0).toLocaleString();
  document.getElementById('statCashCount').textContent=cash.length+'件';
  document.getElementById('statCard').textContent='¥'+card.reduce((s,d)=>s+d.total,0).toLocaleString();
  document.getElementById('statCardCount').textContent=card.length+'件';
  const tbody=document.getElementById('salesHistory');tbody.innerHTML='';
  const head=document.getElementById('salesHistoryHead');
  if(salesFilter==='month'||salesFilter==='month-pick'||salesFilter==='all'){
    head.innerHTML='<th>日付</th><th>現金</th><th>カード</th><th class="num">合計</th>';
  } else {
    head.innerHTML='<th>日時</th><th>お客様</th><th>支払</th><th class="num">金額</th>';
  }
  if(salesFilter==='month'||salesFilter==='month-pick'){
    // 日毎集計
    const dayMap={};
    data.forEach(d=>{
      const key=getBusinessDayDisplay(d.date);
      const dt=new Date(d.date);
      if(!dayMap[key])dayMap[key]={cash:0,card:0,total:0,date:dt};
      dayMap[key].total+=d.total;
      if(d.method==='cash')dayMap[key].cash+=d.total;
      else dayMap[key].card+=d.total;
    });
    const days=Object.entries(dayMap).sort((a,b)=>b[1].date-a[1].date);
    days.forEach(([day,v])=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;color:var(--gold-light);text-decoration:underline;text-underline-offset:3px;" onclick="showDayDetail('${day}')">${day}</td><td><span class="badge-cash">現金</span> ¥${v.cash.toLocaleString()}</td><td><span class="badge-card">カード</span> ¥${v.card.toLocaleString()}</td><td class="num">¥${v.total.toLocaleString()}</td>`;
      tbody.appendChild(tr);
    });
    if(!days.length)tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--gold-dim);font-family:Cormorant Garamond,serif;letter-spacing:0.15em;">データなし</td></tr>';
  } else if(salesFilter==='day'){
    // 今日：お客様ごと
    [...data].reverse().forEach(function(d){
      var dt=new Date(d.date);
      var dtStr=(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+dtStr+'</td><td style="cursor:pointer;color:var(--gold-light);text-decoration:underline;text-underline-offset:3px;" onclick="showReceipt('+d.id+')">'+d.customer+'</td><td><span class="'+(d.method==='cash'?'badge-cash':'badge-card')+'">'+(d.method==='cash'?'現金':'カード')+'</span></td><td class="num">¥'+d.total.toLocaleString()+'</td>';
      tbody.appendChild(tr);
    });
    if(!data.length)tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--gold-dim);font-family:Cormorant Garamond,serif;letter-spacing:0.15em;">データなし</td></tr>';
  } else {
    // 全期間：日毎集計（今月と同じ）
    const dayMap2={};
    data.forEach(d=>{
      const dispKey=getBusinessDayDisplay(d.date);
      const key=getBusinessDay(d.date);
      const dt=new Date(d.date);
      if(!dayMap2[key])dayMap2[key]={cash:0,card:0,total:0,date:dt,dispKey};
      dayMap2[key].total+=d.total;
      if(d.method==='cash')dayMap2[key].cash+=d.total;
      else dayMap2[key].card+=d.total;
    });
    const days2=Object.entries(dayMap2).sort((a,b)=>b[1].date-a[1].date);
    days2.forEach(([key,v])=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;color:var(--gold-light);text-decoration:underline;text-underline-offset:3px;" onclick="showDayDetail('${v.dispKey}')">${v.dispKey}</td><td><span class="badge-cash">現金</span> ¥${v.cash.toLocaleString()}</td><td><span class="badge-card">カード</span> ¥${v.card.toLocaleString()}</td><td class="num">¥${v.total.toLocaleString()}</td>`;
      tbody.appendChild(tr);
    });
    if(!days2.length)tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--gold-dim);font-family:Cormorant Garamond,serif;letter-spacing:0.15em;">データなし</td></tr>';
  }
  const countMap={};
  data.forEach(d=>d.items.forEach(item=>{
    if(!countMap[item.name])countMap[item.name]={qty:0,total:0};
    countMap[item.name].qty+=item.qty;countMap[item.name].total+=item.price*item.qty;
  }));
  const ranked=Object.entries(countMap).sort((a,b)=>b[1].qty-a[1].qty);
  const rtbody=document.getElementById('menuRanking');rtbody.innerHTML='';
  ranked.slice(0,20).forEach(([name,v],i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="rank">${i+1}</td><td>${name}</td><td class="num">${v.qty}</td><td class="num">¥${v.total.toLocaleString()}</td>`;
    rtbody.appendChild(tr);
  });
  if(!ranked.length)rtbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--gold-dim);font-family:Cormorant Garamond,serif;letter-spacing:0.15em;">データなし</td></tr>';
  }); // end getFilteredSales callback
}

    tab.onclick=()=>{

      document.querySelectorAll('.menu-section').forEach(s=>s.classList.remove('active'));
      tab.classList.add('active');document.getElementById('sec-'+cat).classList.add('active');
    };
    strip.appendChild(tab);
    const sec=document.createElement('div');
    sec.className='menu-section'+(i===0?' active':'');sec.id='sec-'+cat;
    const title=document.createElement('div');title.className='menu-section-title';title.textContent=MENU[cat].label;sec.appendChild(title);
    const grid=document.createElement('div');grid.className='menu-grid';
    MENU[cat].items.forEach(function(item){
      var btn=document.createElement('button');btn.className='menu-btn';
      if(item.custom){
        btn.innerHTML='<div class="menu-btn-name">'+item.name+'</div><div class="menu-btn-price" style="color:var(--cream-dim);font-size:11px;">金額を入力</div>';
        btn.onclick=function(){
          var amount=prompt('金額を入力（数字のみ）');
          if(!amount)return;
          var price=parseInt(amount.replace(/[^0-9]/g,''));
          if(isNaN(price)||price<=0){alert('正しい金額を入力してください');return;}
          addToOrder({name:'その他',price:price});
        };
      } else {
        btn.innerHTML='<div class="menu-btn-name">'+item.name+'</div><div class="menu-btn-price">¥'+item.price.toLocaleString()+'</div>';
        btn.onclick=function(){addToOrder(item);};
      }
      grid.appendChild(btn);
    });
    sec.appendChild(grid);sections.appendChild(sec);
  });
}

function switchPage(page,el){

function showToast(msg){

}


function downloadCSV(){
  getFilteredSales(function(data){
  if(!data.length){showToast('データがありません');return;}
  var rows=[['日時','お客様','支払方法','合計金額','注文内容']];
  data.forEach(function(d){
    var dt=new Date(d.date);
    var dtStr=(dt.getFullYear())+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
    var itemsStr=d.items.map(function(i){return i.name+(i.qty>1?'x'+i.qty:'');}).join(' / ');
    rows.push([dtStr,d.customer,d.method==='cash'?'現金':'カード',d.total,itemsStr]);
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var now=new Date();
  var fname='bar-sales-'+now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'.csv';
  a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
  showToast('CSVをダウンロードしました');
  }); // end getFilteredSales callback
}

function addExpense(){
  var date=document.getElementById('expDate').value;
  var store=document.getElementById('expStore').value.trim();
  var item=document.getElementById('expItem').value.trim();
  var amount=parseInt(document.getElementById('expAmount').value);
  if(!date||!item||!amount||isNaN(amount)){showToast('日付・品目・金額は必須です');return;}
  var exp={id:Date.now(),date:date,store:store,item:item,amount:amount};
  saveExpense(exp);
  document.getElementById('expStore').value='';
  document.getElementById('expItem').value='';
  document.getElementById('expAmount').value='';
  renderExpense();
  showToast('経費を追加しました ✓');
}

function deleteExpense(id){
  if(!confirm('この経費を削除しますか?'))return;
  deleteExpenseFromDB(id);
  renderExpense();
}

function renderExpense(){
  var month=document.getElementById('expenseMonthPicker').value;
  getExpenses(function(allExp){
    getFixedExpenses(function(fixedList){
      getSales(function(allSales){
        var filtered=month?allExp.filter(function(e){return e.date.startsWith(month);}):allExp;
        filtered.sort(function(a,b){return b.date.localeCompare(a.date);});
        var expTotal=filtered.reduce(function(s,e){return s+e.amount;},0);
        var fixedTotal=(fixedList||[]).reduce(function(s,e){return s+e.amount;},0);
        expTotal+=fixedTotal;
        var salesFiltered=month?allSales.filter(function(s){
          return getBusinessDay(s.date).startsWith(month.replace('-','/'));
        }):allSales;
        var salesTotal=salesFiltered.reduce(function(s,d){return s+d.total;},0);
        var profit=salesTotal-expTotal;
        var margin=salesTotal>0?Math.round(profit/salesTotal*100):0;
        document.getElementById('expStatSales').textContent='¥'+salesTotal.toLocaleString();
        document.getElementById('expStatCost').textContent='¥'+expTotal.toLocaleString();
        document.getElementById('expStatProfit').textContent='¥'+profit.toLocaleString();
        document.getElementById('expStatProfit').style.color=profit>=0?'var(--green-light)':'var(--red)';
        document.getElementById('expStatMargin').textContent='利益率 '+margin+'%';
        var tbody=document.getElementById('expenseList');
        tbody.innerHTML='';
        filtered.forEach(function(e){
          var tr=document.createElement('tr');
          tr.innerHTML='<td>'+e.date+'</td><td>'+(e.store||'—')+'</td><td>'+e.item+'</td><td class="num">¥'+e.amount.toLocaleString()+'</td>'
            +'<td><button onclick="deleteExpense('+e.id+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:0.6;">✕</button></td>';
          tbody.appendChild(tr);
        });
        if(!filtered.length)tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:18px;color:var(--gold-dim);font-family:Cormorant Garamond,serif;letter-spacing:0.15em;">データなし</td></tr>';
      });
    });
  });
}

// ===== REALTIME SYNC =====
function startRealtimeSync(){
  // 売上タブが開いている時はリアルタイムで更新
  db.ref('sales').on('value', function(){
    var activePage=document.querySelector('.page.active');
    if(activePage&&activePage.id==='page-sales') renderSales();
  });
  db.ref('expenses').on('value', function(){
    var activePage=document.querySelector('.page.active');
    if(activePage&&activePage.id==='page-expense') renderExpense();
  });
}

function downloadFullBackup(){
  getSales(function(sales){
    getExpenses(function(expenses){
      getFixedExpenses(function(fixed){
        var now=new Date();
        var dateStr=now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2);
        var NL=String.fromCharCode(10);
        var COMMA=',';
        var Q='"';
        function esc(c){return Q+String(c).replace(new RegExp(Q,'g'),Q+Q)+Q;}
        function toCSV(rows){return rows.map(function(r){return r.map(esc).join(COMMA);}).join(NL);}
        var salesRows=[['日時','お客様','人数','支払方法','合計金額','注文内容']];
        (sales||[]).forEach(function(d){
          var dt=new Date(d.date);
          var dtStr=(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
          var itemsStr=(d.items||[]).map(function(i){return i.name+(i.qty>1?'x'+i.qty:'');}).join(' / ');
          salesRows.push([dtStr,d.customer,d.guestCount||'',d.method==='cash'?'現金':'カード',d.total,itemsStr]);
        });
        var expRows=[['日付','店舗名','品目','金額']];
        (expenses||[]).forEach(function(e){expRows.push([e.date,e.store||'',e.item,e.amount]);});
        var fixedRows=[['品目','月額']];
        (fixed||[]).forEach(function(e){fixedRows.push([e.item,e.amount]);});
        var sections=['== 売上データ ==','== 経費データ ==','== 固定経費 =='];
        var csv='﻿'+sections[0]+NL+toCSV(salesRows)+NL+NL+sections[1]+NL+toCSV(expRows)+NL+NL+sections[2]+NL+toCSV(fixedRows);
        var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url;a.download='bar-backup-'+dateStr+'.csv';
        a.click();URL.revokeObjectURL(url);
        localStorage.setItem('lastBackup',now.toISOString());
        showToast('バックアップ完了 ✓');
      });
    });
  });
}
function checkBackupReminder(){
  var last=localStorage.getItem('lastBackup');
  if(!last){
    setTimeout(function(){
      showToast('バックアップをとりましょう！売上タブ→全データバックアップ');
    }, 3000);
    return;
  }
  var lastDate=new Date(last);
  var now=new Date();
  var diffDays=Math.floor((now-lastDate)/(1000*60*60*24));
  if(diffDays>=1){
    setTimeout(function(){
      showToast('前回のバックアップから'+diffDays+'日経過しています！');
    }, 3000);
  }
}

  firebase.auth().onAuthStateChanged(function(user){

      document.getElementById('loginScreen').style.display='none';

}
